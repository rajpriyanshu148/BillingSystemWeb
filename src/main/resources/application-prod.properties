# ============================================================
# BillingSystem Pro — PRODUCTION Profile (MySQL)
# Used when: --spring.profiles.active=prod
# OR when env var SPRING_PROFILES_ACTIVE=prod is set
# ============================================================

# ── Database (set these as environment variables on Railway) ──
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/billing_system?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hibernate ─────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Connection Pool ────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── Server ────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Logging ───────────────────────────────────────────────────
logging.level.com.billing=INFO
logging.level.org.hibernate=WARN

# ── App Info (customize these!) ───────────────────────────────
app.name=${APP_NAME:BillingSystem Pro}
app.company=${APP_COMPANY:Your Business Name}
app.address=${APP_ADDRESS:123 Main Street, Your City - 000000}
app.phone=${APP_PHONE:+91-XXXXXXXXXX}
app.gstin=${APP_GSTIN:GSTIN_NUMBER}
app.email=${APP_EMAIL:contact@yourbusiness.com}

invoice.prefix=${INVOICE_PREFIX:INV}
gst.rates=0,5,12,18,28
