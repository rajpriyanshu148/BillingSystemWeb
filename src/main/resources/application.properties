# ============================================================
# BillingSystem Pro — Base Configuration
# ============================================================
# Profile-specific files override these settings:
#   application-dev.properties  → H2 in-memory (no MySQL needed)
#   application-prod.properties → MySQL (Railway / Render / local)
#
# Run locally (dev):  java -jar app.jar --spring.profiles.active=dev
# Run in production:  Set env var SPRING_PROFILES_ACTIVE=prod
# ============================================================

# Active profile: dev locally, set SPRING_PROFILES_ACTIVE=prod on Railway
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server port (Railway injects PORT automatically)
server.port=${PORT:8080}

# Disable open-in-view (best practice)
spring.jpa.open-in-view=false

# Disable SQL init (DataInitializer bean handles seeding)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# ── App Info ────────────────────────────────────────────────
# Override these via env vars on Railway for your business:
app.name=BillingSystem Pro
app.version=1.0.0
app.company=${APP_COMPANY:Your Business Name}
app.address=${APP_ADDRESS:123 Main Street, Your City - 000000}
app.phone=${APP_PHONE:+91-XXXXXXXXXX}
app.gstin=${APP_GSTIN:GSTIN_NUMBER}
app.email=${APP_EMAIL:contact@yourbusiness.com}

# ── Invoice ──────────────────────────────────────────────────
invoice.prefix=${INVOICE_PREFIX:INV}
gst.rates=0,5,12,18,28

# ── Logging ──────────────────────────────────────────────────
logging.level.com.billing=INFO
logging.level.org.springframework.security=WARN
