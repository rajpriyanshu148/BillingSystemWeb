# ============================================================
# BillingSystem Pro - DEV profile (H2 in-memory, no MySQL needed)
# Run with: java -jar app.jar --spring.profiles.active=dev
# ============================================================

spring.datasource.url=jdbc:h2:mem:billing_system;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# H2 console for debugging (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# App info
app.name=BillingSystem Pro
app.version=1.0.0
app.company=Your Business Name
app.address=123 Main Street, Your City - 000000
app.phone=+91-XXXXXXXXXX
app.gstin=GSTIN_NUMBER_HERE
app.email=contact@yourbusiness.com

invoice.prefix=INV
gst.rates=0,5,12,18,28
